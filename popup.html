<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 13px;
      color: #333;
      margin: 0;
    }
    h1 { font-size: 15px; margin: 0 0 10px; }
    #site-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 12px;
      background: #e8f0fe;
      color: #1a73e8;
      font-size: 12px;
      margin-bottom: 12px;
    }
    #site-badge.inactive {
      background: #fce8e6;
      color: #d93025;
    }
    #status {
      min-height: 52px;
      padding: 8px 10px;
      background: #f8f9fa;
      border-radius: 4px;
      font-size: 12px;
      white-space: pre-wrap;
      line-height: 1.6;
      margin-bottom: 10px;
    }
    #status.success { color: #188038; }
    #status.error   { color: #d93025; }
    button {
      width: 100%;
      padding: 10px;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
      margin-bottom: 6px;
    }
    #run-btn { background: #1a73e8; }
    #run-btn:hover:not(:disabled) { background: #1557b0; }
    #retry-btn { background: #e8710a; }
    #retry-btn:hover:not(:disabled) { background: #b85c08; }
    #fill-btn { background: #8430ce; }
    #fill-btn:hover:not(:disabled) { background: #6a26a8; }
    button:disabled { background: #bbb; cursor: not-allowed; }
  </style>
</head>
<body>
  <h1>FC2ブログスクレイパー</h1>
  <div id="site-badge">サイト確認中...</div>
  <div id="status">対象ページを開いてください。</div>
  <button id="run-btn" disabled>スクレイピング開始</button>
  <button id="retry-btn" disabled>画像再取得（取得失敗分）</button>
  <button id="fill-btn" disabled>欠損情報を補完（他サイト参照）</button>
  <script src="popup.js"></script>
</body>
</html>
